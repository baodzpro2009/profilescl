<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hoàng Bảo | Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="Hoàng Bảo">
<meta property="og:description" content="Trang cá nhân Hoàng Bảo">
<meta property="og:image" content="https://i.imgur.com/l5UJMh8.png">

<link rel="icon" href="https://i.imgur.com/l5UJMh8.png">

<link rel="stylesheet" href="https://cdn.leanhduc.pro.vn/font-awesome/pro-5.15.3/css/all.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BACKGROUND -->
<video class="bg-video" autoplay muted loop playsinline>
  <source src="https://files.catbox.moe/3sgs0o.mp4">
</video>
<div class="bg-overlay"></div>

<!-- PROFILE CARD -->
<div class="profile">
  <div class="avatar">
    <img src="https://files.catbox.moe/8wf4e7.jpg">
  </div>

  <div class="name">Hoàng Thế Bảo 🌸</div>

  <div class="bio">
    <!-- CLICK MỞ GOOGLE MAP -->
    <span class="location" onclick="openMap()">📍Nơi ở: Tuyên Quang</span>
    <span>🌸Sở Thích Nghe Nhạc</span>
    <span>🎵Code Mấy Trò Trẻ Con</span>
  </div>

  <div class="box facebook" onclick="window.open('https://www.facebook.com/hoang.the.bao.348976','_blank')">
    <i class="fab fa-facebook"></i> Facebook
  </div>

  <div class="box tiktok" onclick="window.open('https://www.tiktok.com/@th.bo.hong','_blank')">
    <i class="fab fa-tiktok"></i> TikTok
  </div>

  <div class="box zalo" onclick="window.open('https://zalo.me/0342101746','_blank')">
    <i class="fas fa-comment"></i> Zalo
  </div>

  <div class="box mbbank" onclick="navigator.clipboard.writeText('0342101746')">
    <i class="fas fa-university"></i> MB Bank
  </div>
</div>

<!-- SPOTIFY MINI -->
<div class="spotify">
  <div class="song-title" id="title">🎧 Nhạc nền</div>
  <div class="song-artist">Hoàng Bảo</div>

  <div class="progress" onclick="seek(event)">
    <div class="progress-bar" id="bar"></div>
  </div>

  <div class="time">
    <span id="current">0:00</span>
    <span id="duration">0:00</span>
  </div>

  <div class="controls">
    <i class="fas fa-backward" onclick="prevSong()"></i>
    <div class="play" onclick="togglePlay()">
      <i id="pp" class="fas fa-play"></i>
    </div>
    <i class="fas fa-forward" onclick="nextSong()"></i>
  </div>
</div>

<audio id="audio" preload="auto"></audio>

<script src="player.js"></script>
<!-- Vercel Speed Insights -->
<script type="module">
  import { injectSpeedInsights } from 'https://cdn.jsdelivr.net/npm/@vercel/speed-insights@2/dist/index.mjs';
  injectSpeedInsights();
</script>
<!-- SOUNDCLOUD SEARCH MINI -->
<div class="scl-search" id="sclPlayer">
  <div class="scl-header">
    <i class="fab fa-soundcloud"></i>
    <span>Tìm nhạc SoundCloud</span>
  </div>
  
  <div class="scl-input-container">
    <input type="text" id="sclKeyword" placeholder="Tên bài hát hoặc nghệ sĩ..." autocomplete="off">
    <button id="sclSearchBtn">
      <i class="fas fa-search"></i>
    </button>
  </div>

  <div class="scl-results" id="sclResults"></div>
</div>
<!-- SCRIPT MỞ GOOGLE MAP -->
<script>
function openMap() {
  window.open("https://www.google.com/maps/place/Tuyen+Quang,+Vietnam", "_blank");
}
</script>

</body>
</html>
